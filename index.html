<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Screener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #2563eb;
      --blue-light: #eff6ff;
      --blue-mid:   #bfdbfe;
      --blue-dark:  #1d4ed8;
      --white:      #ffffff;
      --bg:         #f8fafc;
      --border:     #e2e8f0;
      --text:       #0f172a;
      --sub:        #64748b;
      --muted:      #94a3b8;
      --radius:     10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── header ────────────────────────────── */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1080px;
      margin: auto;
      padding: 0 2rem;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 15px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -.4px;
    }
    .logo span { color: var(--text); font-weight: 500; }
    .pill {
      font-size: 11px;
      font-weight: 600;
      color: var(--blue);
      background: var(--blue-light);
      border: 1px solid var(--blue-mid);
      border-radius: 20px;
      padding: .2rem .75rem;
      letter-spacing: .3px;
    }

    /* ─── hero ──────────────────────────────── */
    .hero {
      max-width: 540px;
      margin: 3.5rem auto 2.75rem;
      padding: 0 2rem;
      text-align: center;
    }
    .hero h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.6px;
      line-height: 1.25;
      color: var(--text);
    }
    .hero h1 em {
      font-style: normal;
      color: var(--blue);
    }
    .hero p {
      margin-top: .65rem;
      color: var(--sub);
      font-size: 14px;
    }

    /* ─── layout ─────────────────────────────── */
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 0 2rem 5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }

    /* ─── panel ──────────────────────────────── */
    .panel {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .panel-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .9px;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 1rem;
    }

    /* ─── form ───────────────────────────────── */
    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: .4rem;
      color: var(--text);
    }
    .field-label .hint { font-weight: 400; color: var(--muted); }

    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: .75rem .9rem;
      resize: vertical;
      min-height: 150px;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
    }
    textarea::placeholder { color: var(--muted); }

    /* ─── drop zone ──────────────────────────── */
    .drop-zone {
      position: relative;
      border: 1.5px dashed var(--blue-mid);
      border-radius: var(--radius);
      background: var(--blue-light);
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      margin-bottom: .75rem;
    }
    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--blue);
      background: #dbeafe;
    }
    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
    }
    .dz-icon {
      font-size: 1.4rem;
      margin-bottom: .35rem;
      color: var(--blue);
    }
    .dz-text { font-size: 13px; color: var(--sub); }
    .dz-text strong { color: var(--blue); font-weight: 600; }

    /* ─── file chips ─────────────────────────── */
    #file-list { display: flex; flex-wrap: wrap; gap: .4rem; }
    .chip {
      display: flex;
      align-items: center;
      gap: .35rem;
      font-size: 12px;
      color: var(--blue-dark);
      background: var(--blue-light);
      border: 1px solid var(--blue-mid);
      border-radius: 5px;
      padding: .2rem .55rem;
      font-weight: 500;
    }
    .chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: .8rem;
      line-height: 1;
      padding: 0;
      transition: color .15s;
    }
    .chip button:hover { color: var(--blue-dark); }

    /* ─── button ─────────────────────────────── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      width: 100%;
      padding: .72rem 1rem;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
      margin-top: 1.25rem;
    }
    .btn:hover {
      background: var(--blue-dark);
      box-shadow: 0 4px 14px rgba(37,99,235,.3);
    }
    .btn:active { background: #1e40af; }
    .btn:disabled { background: var(--muted); cursor: not-allowed; box-shadow: none; }

    /* ─── spinner ────────────────────────────── */
    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 1.5px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── placeholder ────────────────────────── */
    #placeholder-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
    }
    .empty { text-align: center; color: var(--muted); }
    .empty-icon {
      font-size: 2rem;
      margin-bottom: .75rem;
      opacity: .35;
      color: var(--blue);
    }
    .empty p { font-size: 13px; }

    /* ─── results ────────────────────────────── */
    #results-panel { display: none; }

    .results-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .count-label { font-size: 12px; color: var(--sub); }

    /* stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .65rem;
      margin-bottom: 1.25rem;
    }
    .stat {
      background: var(--blue-light);
      border: 1px solid var(--blue-mid);
      border-radius: var(--radius);
      padding: .75rem;
      text-align: center;
    }
    .stat-val {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -.4px;
      color: var(--blue);
    }
    .stat-lbl {
      font-size: 10.5px;
      color: var(--sub);
      margin-top: .15rem;
    }

    /* rows */
    .result-scroll {
      max-height: 70vh;
      overflow-y: auto;
    }
    .result-scroll::-webkit-scrollbar { width: 4px; }
    .result-scroll::-webkit-scrollbar-track { background: transparent; }
    .result-scroll::-webkit-scrollbar-thumb {
      background: var(--blue-mid);
      border-radius: 2px;
    }

    .result-row {
      display: grid;
      grid-template-columns: 32px 1fr 60px;
      gap: .75rem;
      align-items: center;
      padding: .9rem 0;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .result-row:last-child { border-bottom: none; }

    .rank-num {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      text-align: center;
    }
    .rank-num.top { color: var(--blue); }

    .result-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text);
    }
    .result-cat {
      display: inline-block;
      margin-top: .22rem;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--blue);
      background: var(--blue-light);
      border: 1px solid var(--blue-mid);
      border-radius: 4px;
      padding: .08rem .45rem;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .result-snippet {
      font-size: 12px;
      color: var(--sub);
      margin-top: .25rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .match-col { text-align: right; }
    .match-pct {
      font-size: 15px;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: -.4px;
    }
    .match-label { font-size: 10px; color: var(--muted); }

    /* ─── toast ──────────────────────────────── */
    #toast {
      display: none;
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 999;
      background: var(--text);
      color: var(--white);
      border-radius: var(--radius);
      padding: .7rem 1.1rem;
      font-size: 13px;
      max-width: 340px;
      box-shadow: 0 4px 20px rgba(0,0,0,.14);
      animation: slideUp .2s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(6px); }
    }
  </style>
</head>
<body>

<!-- header -->
<header>
  <div class="header-inner">
    <div class="logo">Resume<span>Screener</span></div>
    <span class="pill">ML & NLP Based</span>
  </div>
</header>

<!-- hero -->
<div class="hero">
  <h1> <em>Automated Resume Screening</em></h1>
  <p>Upload resumes and paste a job description to get ranked candidates in seconds.</p>
</div>

<!-- main -->
<main>
  <div class="grid">

    <!-- LEFT: form -->
    <div>
      <form id="screen-form">

        <div class="panel" style="margin-bottom:1rem">
          <div class="panel-label">Job Description</div>
          <textarea id="jd" name="job_description"
            placeholder="Paste the full job description here…"></textarea>
        </div>

        <div class="panel">
          <div class="panel-label">Resumes</div>
          <label class="field-label">
            Upload files <span class="hint">— .txt, .pdf or .docx</span>
          </label>

          <div class="drop-zone" id="drop-zone">
            <input type="file" id="resume-input" name="resumes"
                   multiple accept=".txt,.pdf,.docx" />
            <div class="dz-icon">↑</div>
            <div class="dz-text">
              <strong>Click to browse</strong> or drag &amp; drop
            </div>
          </div>

          <div id="file-list"></div>

          <button type="submit" class="btn" id="submit-btn">
            <div class="spinner" id="spinner"></div>
            <span id="btn-label">Run Screener</span>
          </button>
        </div>

      </form>
    </div>

    <!-- RIGHT: output -->
    <div>

      <div id="placeholder-panel">
        <div class="empty">
          <div class="empty-icon">⊙</div>
          <p>Results will appear here.</p>
        </div>
      </div>

      <div id="results-panel">
        <div class="panel">
          <div class="results-top">
            <div class="panel-label" style="margin-bottom:0">Results</div>
            <span class="count-label" id="count-label"></span>
          </div>

          <div class="stats" id="stats"></div>
          <div class="result-scroll" id="result-list"></div>
        </div>
      </div>

    </div>
  </div>
</main>

<div id="toast"></div>

<script>
/* ── file management ── */
let selectedFiles = [];
const fileInput = document.getElementById('resume-input');
const fileList  = document.getElementById('file-list');
const dropZone  = document.getElementById('drop-zone');

function renderChips() {
  fileList.innerHTML = '';
  selectedFiles.forEach((f, i) => {
    const c = document.createElement('div');
    c.className = 'chip';
    c.innerHTML = `<span>${f.name}</span><button type="button" data-i="${i}">✕</button>`;
    fileList.appendChild(c);
  });
  fileList.style.marginTop = selectedFiles.length ? '.5rem' : '0';
  fileList.querySelectorAll('button').forEach(b =>
    b.addEventListener('click', () => { selectedFiles.splice(+b.dataset.i, 1); renderChips(); })
  );
}

fileInput.addEventListener('change', () => {
  selectedFiles.push(...fileInput.files);
  fileInput.value = '';
  renderChips();
});
dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  selectedFiles.push(...e.dataTransfer.files);
  renderChips();
});

/* ── toast ── */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

/* ── submit ── */
document.getElementById('screen-form').addEventListener('submit', async e => {
  e.preventDefault();
  const jd = document.getElementById('jd').value.trim();
  if (!jd) return toast('Please enter a job description.');
  if (!selectedFiles.length) return toast('Please upload at least one resume.');

  const btn    = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  const label  = document.getElementById('btn-label');
  btn.disabled = true;
  spinner.style.display = 'block';
  label.textContent = 'Analysing…';

  const fd = new FormData();
  fd.append('job_description', jd);
  selectedFiles.forEach(f => fd.append('resumes', f));

  try {
    const res  = await fetch('/predict', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok || data.error) return toast(data.error || 'Server error.');
    render(data.results);
  } catch (err) {
    toast('Network error: ' + err.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    label.textContent = 'Run Screener';
  }
});

/* ── render ── */
function render(results) {
  document.getElementById('placeholder-panel').style.display = 'none';
  const panel = document.getElementById('results-panel');
  panel.style.display = 'block';

  document.getElementById('count-label').textContent =
    `${results.length} candidate${results.length !== 1 ? 's' : ''}`;

  const max  = results.length ? Math.max(...results.map(r => r.match_percent)) : 0;
  const avg  = results.length ? results.reduce((s, r) => s + r.match_percent, 0) / results.length : 0;
  const cats = new Set(results.map(r => r.category)).size;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-val">${results.length}</div><div class="stat-lbl">Total</div></div>
    <div class="stat"><div class="stat-val">${max.toFixed(1)}%</div><div class="stat-lbl">Top Match</div></div>
    <div class="stat"><div class="stat-val">${avg.toFixed(1)}%</div><div class="stat-lbl">Average</div></div>
    <div class="stat"><div class="stat-val">${cats}</div><div class="stat-lbl">Categories</div></div>`;

  const list = document.getElementById('result-list');
  list.innerHTML = '';
  results.forEach(r => {
    const row = document.createElement('div');
    row.className = 'result-row';
    row.innerHTML = `
      <div class="rank-num ${r.rank <= 3 ? 'top' : ''}">${r.rank}</div>
      <div>
        <div class="result-name" title="${r.filename || ''}">${r.filename || 'Resume ' + r.candidate_id}</div>
        <span class="result-cat">${r.category}</span>
        <div class="result-snippet">${r.snippet || ''}</div>
      </div>
      <div class="match-col">
        <div class="match-pct">${r.match_percent.toFixed(1)}%</div>
        <div class="match-label">match</div>
      </div>`;
    list.appendChild(row);
  });

  if (window.innerWidth <= 760)
    panel.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
